name: Source benchmark

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Benchmark sources on macOS
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        # actions/checkout v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Pre-install a few formulae that some src/*.sh files probe via
      # `brew --prefix`. Anything missing just shows up as a no-op in the
      # benchmark, so this list is intentionally minimal.
      - name: Install supporting brew formulae
        run: |
          brew install coreutils libpq >/dev/null

      - name: Run benchmark
        run: |
          chmod +x scripts/benchmark-sources.zsh
          ./scripts/benchmark-sources.zsh "${{ runner.temp }}/bench-result.md"
          echo "----- bench-result.md -----"
          cat "${{ runner.temp }}/bench-result.md"

      - name: Upload result as artifact
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: source-benchmark
          path: ${{ runner.temp }}/bench-result.md

      - name: Post sticky PR comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        # marocchino/sticky-pull-request-comment v2.9.4
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          header: source-benchmark
          path: ${{ runner.temp }}/bench-result.md
